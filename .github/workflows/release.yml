name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the version PR / tags
  id-token: write # npm provenance
  pull-requests: write # open the "Version Packages" PR

# Changesets flow: a push to main with pending changesets opens a "Version Packages" PR. Merging that
# PR (the human approval gate) bumps versions and triggers publish with provenance.
# NOTE: uses NPM_TOKEN today; Phase C migrates to npm OIDC trusted publishing once configured npm-side.
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify
        run: |
          pnpm format:check
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm build
          pnpm attw
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `pnpm run version` — NOT `pnpm version`, which is pnpm's built-in and shadows the script.
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance requires a PUBLIC source repo; auto-enables when this repo goes public.
          NPM_CONFIG_PROVENANCE: ${{ github.event.repository.visibility == 'public' }}
